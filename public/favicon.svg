<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Book back cover -->
  <rect x="5" y="4" width="20" height="24" rx="2" ry="2" fill="#6B3A2A"/>
  <!-- Book spine -->
  <rect x="5" y="4" width="4" height="24" rx="1" ry="1" fill="#4A2518"/>
  <!-- Book pages -->
  <rect x="8" y="5" width="16" height="22" fill="#F5ECD7"/>
  <!-- Page lines -->
  <line x1="11" y1="10" x2="22" y2="10" stroke="#C9B99A" stroke-width="1"/>
  <line x1="11" y1="13" x2="22" y2="13" stroke="#C9B99A" stroke-width="1"/>
  <line x1="11" y1="16" x2="22" y2="16" stroke="#C9B99A" stroke-width="1"/>
  <line x1="11" y1="19" x2="22" y2="19" stroke="#C9B99A" stroke-width="1"/>
  <line x1="11" y1="22" x2="19" y2="22" stroke="#C9B99A" stroke-width="1"/>
  <!-- Book front cover top edge -->
  <rect x="8" y="4" width="17" height="2" rx="1" fill="#8B4A35"/>
  <!-- Book front cover bottom edge -->
  <rect x="8" y="26" width="17" height="2" rx="1" fill="#8B4A35"/>
</svg>
